# Test: JobRun with callbackUrl sets the annotation on the created Job
---
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: jobrun-callback-annotation
spec:
  steps:
    - try:
        - apply:
            resource:
              apiVersion: cellbytes.io/v1
              kind: JobTemplate
              metadata:
                name: callback-template
              spec:
                template:
                  spec:
                    containers:
                      - name: busybox
                        image: busybox
                        command: ["echo", "hello"]
                    restartPolicy: Never
        - apply:
            resource:
              apiVersion: cellbytes.io/v1
              kind: JobRun
              metadata:
                name: callback-jobrun
              spec:
                templateRef: callback-template
                callbackUrl: "https://example.com/callback"
                callbackToken: "secret-token"
        - assert:
            resource:
              apiVersion: batch/v1
              kind: Job
              metadata:
                labels:
                  cellbytes.io/job-template: callback-template
                  cellbytes.io/job-run: callback-jobrun
                annotations:
                  cellbytes.io/callback-url: "https://example.com/callback"
                  cellbytes.io/callback-token: "secret-token"
